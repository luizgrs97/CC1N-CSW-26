<!DOCTYPE html>

<head>

<body>
    <h1>Formulário</h1>
    <br>
    <form action="naosei" method="post">
        <table border="1">
            <tbody>
                <tr>
                    <td>Nome:</td>
                    <td><input type="text" name="username" id="username" size="40" maxlength="30" value="" placeholder="Digite seu nome" required></td>
                </tr>
                <tr>
                    <td>E-mail pessoal:</td>
                    <td><input type="email" name="email" id="email" size="40"></td>
                </tr>
                <tr>
                    <td>Email (patter):</td>
                    <td><input type="email" name="email" id="email" size="40" placeholder="Digite seu email com @" required></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
