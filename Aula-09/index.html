<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula 09</title>
</head>
<body>
    <style>table, td {border-collapse: collapse; border: 2px solid gray; padding: 4px;}</style>
    <h1>Formulário</h1>
    <br>
    <form action="mailto:email@email.com" method="post">
        <table>
            <tbody>
                <tr>
                    <td><label for="">Nome:</label></td>
                    <td><input type="text" name="username" id="username" size="20" maxlength="30" value="" placeholder="Digite seu nome" required></td>
                </tr>
                <tr>
                    <td><label for="">E-mail pessoal:</label></td>
                    <td><input type="text" name="emailname" id="emailname" size="20"></td>
                </tr>
                <tr>
                    <td><label for="">Email (patter):</label></td>
                    <td><input type="email" name="email" id="email" size="20" placeholder="Digite seu email com @" required></td>
                </tr>
                <tr>
                    <td><label for="">Senha:</label></td>
                    <td><input type="password" name="password" id="password" size="20" required></td>
                </tr>
                <tr>
                    <td><label for="">Idade:</label></td>
                    <td><input type="text" name="years" size="5"></td>
                </tr>
                <tr>
                    <td colspan="2">
                        <label for="">Deixe um comentário:</label>
                        <br>
                        <textarea name="comment" id="comment" cols="40" rows="5"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Matéria de interesse:</label>
                        <br>
                        <input type="checkbox" name="backend" value="backend"> Backend
                        <br>
                        <input type="checkbox" name="frontend" value="frontend"> Frontend
                        <br>
                        <input type="checkbox" name="fullstack" value="fullstack"> Fullstack
                    </td>
                    <td>
                        <label for="">Tipo de Viagem:</label>
                        <br>
                        <input type="radio" name="viagem" id="viagem" value="negocios">Negócios
                        <br>
                        <input type="radio" name="viagem" id="viagem" value="lazer">Lazer
                        <br>
                        <input type="radio" name="viagem" id="viagem" value="turismo">Turismo
                        <br>
                        <input type="radio" name="viagem" id="viagem" value="academico">Acadêmico
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Esporte favorito:</label>
                        <select name="esporte" id="esporte" size="4">
                            <option value="futebol">Futebol</option>
                            <option value="basquete">Basquete</option>
                            <option value="volei">Vôlei</option>
                            <option value="Tênis">Tênis</option>
                        </select>
                    </td>
                    <td>
                        <label for="">Investimentos:</label>
                        <select name="invest" id="invest">
                            <optgroup label="Baixo Risco">
                            <option value="invest-01">Poupança</option>
                            <option value="invest-02">CDB</option>
                            <option value="invest-03">Tesouro Direto</option>
                            </optgroup>
                            <optgroup label="Médio Risco">
                            <option value="invest-04">Fundos Imobiliários</option>
                            <option value="invest-05">CDI</option>
                            <option value="invest-06">DEBÊNTURES</option>
                            </optgroup>
                            <optgroup label="Alto Risco">
                            <option value="invest-07">Criptomoedas</option>
                            <option value="invest-08">Ações</option>
                            </optgroup>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="">Escolha uma cor:</label>
                        <input type="color" name="color" id="color">
                    </td>
                    <td>
                        <label for="">Selecione um arquivo:</label>
                        <input type="file" name="file" id="file">
                        <p><br></p>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <label for="">Data e Hora envio:</label>
                        <input type="datetime-local">
                        <p></p>
                    </td>
                </tr>
                <tr>
                    <td><input type="submit" value="Enviar"></td>
                    <td><input type="reset" value="Limpar"></td>
                </tr>
            </tbody>
        </table>
    </form>
</body>
</html>
